        value: "20738"
      - key: RPC_PORT
        value: "20736"
      - key: REST_PORT
        value: "20734"
      - key: WS_PORT
        value: "20735"
      - key: DATA_DIR
        value: "/chain-data"
      - key: WALLET_PASSWORD
        value: "123456"
      - key: BOOTSTRAP_HOST
        value: dna-bootstrap.onrender.com
