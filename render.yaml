        value: "20538"
      - key: RPC_PORT
        value: "20536"
      - key: REST_PORT
        value: "20534"
      - key: WS_PORT
        value: "20535"
      - key: DATA_DIR
        value: "/chain-data"
      - key: WALLET_PASSWORD
        value: "123456"
      - key: BOOTSTRAP_HOST
        value: dna-bootstrap.onrender.com

  # ── Validator Node 4 ───────────────────────────────────────────────────────
  - type: worker
    name: dna-node-4
    runtime: native
    repo: https://github.com/YOUR_USERNAME/DNA
    buildCommand: chmod +x dnaNode deploy/start-node.sh
    startCommand: bash deploy/start-node.sh
    plan: starter
    disk:
      name: node4-chain-data
      mountPath: /chain-data
      sizeGB: 5
    envVars:
      - key: NODE_NUM
        value: "4"
      - key: NODE_PORT
        value: "20638"
      - key: RPC_PORT
        value: "20636"
      - key: REST_PORT
        value: "20634"
      - key: WS_PORT
        value: "20635"
      - key: DATA_DIR
        value: "/chain-data"
      - key: WALLET_PASSWORD
        value: "123456"
      - key: BOOTSTRAP_HOST
        value: dna-bootstrap.onrender.com

  # ── Validator Node 5 ───────────────────────────────────────────────────────
